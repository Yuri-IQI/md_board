<div id="panel-editor" class="panel active">
    <div class="panel-header">Editor</div>
    <textarea
            id="editor-textarea"
            name="markdown"
            placeholder="Escreva seu Markdown aqui..."
            hx-post="/editor/{username}/save"
            hx-trigger="keyup changed delay:1s"
            hx-include="this"
            hx-swap="none"
            hx-on::after-request="htmx.trigger('#feed-content', 'feedRefresh')"
    >{markdown}</textarea>
</div>
